apiVersion: v1
kind: ConfigMap
metadata:
  name: terriergpt-cache-config
  namespace: default
data:
  SIMILARITY_THRESHOLD: "0.75"
  MODEL: "all-MiniLM-L6-v2"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: terriergpt-cache
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: terriergpt-cache
  template:
    metadata:
      labels:
        app: terriergpt-cache
    spec:
      containers:
      - name: cache-service
        image: quay.io/bostonu/terriergpt-cache:latest
        imagePullPolicy: Always
        command: ["python", "cache_cli.py", "stats"]
        envFrom:
        - configMapRef:
            name: terriergpt-cache-config
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        volumeMounts:
        - name: cache-storage
          mountPath: /app/chroma_db
      volumes:
      - name: cache-storage
        emptyDir: {}
